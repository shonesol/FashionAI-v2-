<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FashionAI Wardrobe</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-header">

<div class="logo">
✨ FashionAI
</div>

</header>




<section class="welcome">

<h1>
My Wardrobe 👗
</h1>

<p>
Your private intelligent closet.
</p>

</section>





<!-- SEARCH -->

<section class="card">

<h3>
🔍 Search Clothes
</h3>


<input 
id="searchBox"
placeholder="Search color, category, style..."
>


</section>






<!-- FILTERS -->

<section class="card">


<h3>
🎨 Filters
</h3>


<select id="categoryFilter">

<option value="">
All Categories
</option>

<option value="shirt">
Shirts
</option>

<option value="dress">
Dresses
</option>

<option value="pants">
Pants
</option>

<option value="shoes">
Shoes
</option>


</select>




<select id="colorFilter">

<option value="">
All Colors
</option>

<option value="white">
White
</option>

<option value="black">
Black
</option>

<option value="blue">
Blue
</option>

<option value="beige">
Beige
</option>


</select>


</section>








<!-- OUTFIT GENERATOR -->


<section class="card">


<h3>
✨ Create Outfit
</h3>


<select id="occasion">


<option value="casual">
Casual
</option>


<option value="office">
Office
</option>


<option value="party">
Party
</option>


<option value="travel">
Travel
</option>


</select>


<button id="generateBtn">

Generate Look

</button>


<div id="outfitResult">

</div>


</section>









<h2 class="section-title">

My Clothes

</h2>




<section 
id="wardrobeGrid"
class="actions">

</section>









<nav class="bottom-nav">

<div>
🏠
<br>
Home
</div>


<div>
👗
<br>
Wardrobe
</div>


<div>
✨
<br>
AI
</div>


<div>
👤
<br>
Profile
</div>


</nav>





<script type="module" src="wardrobe.js"></script>


</body>

</html>
