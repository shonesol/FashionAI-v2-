<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Clothing | FashionAI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-header">

<div class="logo">
✨ FashionAI
</div>

</header>



<section class="welcome">

<h1>
Edit Clothing ✏️
</h1>

<p>
Update your wardrobe details.
</p>

</section>





<section class="card">


<img
id="editImage"
style="
width:100%;
border-radius:25px;
">



<input
id="editCategory"
placeholder="Category"
>



<input
id="editColor"
placeholder="Color"
>



<input
id="editMaterial"
placeholder="Material"
>



<input
id="editStyle"
placeholder="Style"
>




<button id="saveEdit">

Save Changes

</button>


</section>





<script type="module" src="edit-clothing.js"></script>


</body>

</html>
