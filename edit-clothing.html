<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
FashionAI Edit Clothing
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>




<header class="top-header">


<div class="logo">

✨ FashionAI

</div>


<div class="icons">

👗

</div>


</header>







<section class="welcome">


<h1>

Edit Your Style ✨

</h1>


<p>

Update your wardrobe details anytime.

</p>


</section>









<section class="card edit-card">





<img

id="editImage"

class="edit-image"

src=""

alt="Clothing Preview"

>








<h3>

Clothing Information

</h3>





<label>

Category

</label>


<input

id="editCategory"

placeholder="Example: Dress, Shirt, Shoes"

>







<label>

Color

</label>


<input

id="editColor"

placeholder="Example: Blue, White, Black"

>







<label>

Material

</label>


<input

id="editMaterial"

placeholder="Example: Cotton, Silk"

>







<label>

Style

</label>


<input

id="editStyle"

placeholder="Example: Elegant, Casual"

>







<button

id="saveEdit"

>

💾 Save Changes

</button>





</section>









<section class="card">


<h3>

🔒 Privacy

</h3>


<p>

Your clothing information is stored privately on your device.

</p>


</section>









<nav class="bottom-nav">


<div>

🏠

<br>

Home

</div>



<div>

👗

<br>

Wardrobe

</div>




<div>

✨

<br>

AI

</div>




<div>

👤

<br>

Profile

</div>



</nav>

type="module"

src="edit-clothing.js">

</script>





</body>

</html>
